[config]
schemaVersion = "0.0.1"

[package]
namespace = "Sparroh"
name = "ConsumableHotkeys"
description = "Hotkeys and status HUD for Personal Access Token, Premium Loot License, Bootleg Replicator, and Clearance Certificate. Hotkeys are blocked in chat, menus, and known mod UIs."
websiteUrl = "https://github.com/Little-Sparroh/ConsumableHotkeys"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"
Sparroh-SparrohUILib = "1.1.1"


[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"
[[build.copy]]
source = "bin/Release/net48/ConsumableHotkeys.dll"
target = "BepInEx/plugins/ConsumableHotkeys.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "client" ]
